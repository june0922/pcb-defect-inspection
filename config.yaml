env: local
judge:
  conf_threshold: 0.5
  iou_threshold: 0.45
  review_band:
  - 0.3
  - 0.5
paths:
  colab:
    project_root: /content/pcb-defect-inspection
    raw_data: dataset/PCBData
  local:
    project_root: .
    raw_data: dataset/PCBData
  server:
    project_root: .
    raw_data: dataset/PCBData
preprocess:
  img_size: 640
split:
  random_state: 42
  test: 0.1
  train: 0.7
  val: 0.2
train:
  batch: 16
  epochs: 100
  imgsz: 640
  model: weights/yolov8n.pt
  patience: 50
  workers: 4
  device: 0  # 0=GPU, cpu=CPU. Colab/서버는 0, 로컬 CPU 전용 환경은 cpu
tune:
  epochs: 15        # 판별용 미니 학습 (수렴 불필요, 15로 충분)
  imgsz: 640
  iterations: 100   # GA 수렴 실무 권장값 (sigma 0.2→0.15 수렴)
  model: weights/yolov8n.pt
  workers: 4
kfold:
  k: 5
  random_state: 42
