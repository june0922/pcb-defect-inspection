env: local
paths:
  colab:
    project_root: /content/pcb-defect-inspection
    raw_data: dataset/PCBData
  local:
    project_root: .
    raw_data: dataset/PCBData
  server:
    project_root: .
    raw_data: dataset/PCBData
preprocess:
  img_size: 1280
split:
  random_state: 42
  test: 0.1
  train: 0.7
  val: 0.2
train:
  imgsz: 1280
  batch: 16
  epochs: 500
  model: weights/yolo26s.pt
  patience: 100
  device: 0  # 0=GPU, cpu=CPU. Colab/서버는 0, 로컬 CPU 전용 환경은 cpu
  cache: ram
train_tune:
  imgsz: 1280
  batch: 16
  epochs: 500
  model: weights/yolo26s.pt
  patience: 100
  device: 0
  cache: ram
  lr0: 0.00302
  lrf: 0.01199
  momentum: 0.80234
  weight_decay: 0.00053
  warmup_epochs: 4.48591
  warmup_momentum: 0.95
  box: 7.87952
  cls: 0.37333
  cls_pw: 0.02866
  dfl: 1.91088
  hsv_h: 0.023
  hsv_s: 0.45353
  hsv_v: 0.66066
  degrees: 0.01553
  translate: 0.09454
  scale: 0.29856
  shear: 0.0
  perspective: 0.0
  flipud: 0.00033
  fliplr: 0.23179
  bgr: 0.00516
  mosaic: 1.0
  mixup: 0.00123
  cutmix: 0.00106
  copy_paste: 0.0
  close_mosaic: 6
tune:
  imgsz: 1280
  batch: -1
  epochs: 100
  iterations: 100
  model: weights/yolo26s.pt
  patience: 30
  device: 0
  cache: ram
kfold:
  k: 5
  random_state: 42
kfold_tune:
  imgsz: 1280
  batch: 16
  epochs: 500
  model: weights/yolo26s.pt
  patience: 100
  device: 0
  cache: ram
  lr0: 0.00302
  lrf: 0.01199
  momentum: 0.80234
  weight_decay: 0.00053
  warmup_epochs: 4.48591
  warmup_momentum: 0.95
  box: 7.87952
  cls: 0.37333
  cls_pw: 0.02866
  dfl: 1.91088
  hsv_h: 0.023
  hsv_s: 0.45353
  hsv_v: 0.66066
  degrees: 0.01553
  translate: 0.09454
  scale: 0.29856
  shear: 0.0
  perspective: 0.0
  flipud: 0.00033
  fliplr: 0.23179
  bgr: 0.00516
  mosaic: 1.0
  mixup: 0.00123
  cutmix: 0.00106
  copy_paste: 0.0
  close_mosaic: 6
evaluate:
  weights: weights/best.pt
