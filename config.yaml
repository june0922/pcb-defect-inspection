env: local
judge:
  conf_threshold: 0.5
  iou_threshold: 0.45
  review_band:
  - 0.3
  - 0.5
paths:
  colab:
    project_root: /content/pcb-defect-inspection
    raw_data: dataset/PCBData
  local:
    project_root: .
    raw_data: dataset/PCBData
  server:
    project_root: .
    raw_data: dataset/PCBData
preprocess:
  img_size: 1280
split:
  random_state: 42
  test: 0.1
  train: 0.7
  val: 0.2
train:
  imgsz: 1280
  batch: -1
  epochs: 500
  model: weights/yolo26n.pt
  patience: 100
  device: 0  # 0=GPU, cpu=CPU. Colab/서버는 0, 로컬 CPU 전용 환경은 cpu
  cache: ram
train_tune:
  imgsz: 1280
  batch: -1
  epochs: 500
  model: weights/yolo26n.pt
  patience: 100
  device: 0
  cache: ram
  lr0: 0.00685
  lrf: 0.01249
  momentum: 0.90303
  weight_decay: 0.00065
  warmup_epochs: 3.06163
  warmup_momentum: 0.62303
  box: 10.32546
  cls: 0.66305
  cls_pw: 0.00289
  dfl: 1.49476
  hsv_h: 0.01517
  hsv_s: 0.75373
  hsv_v: 0.24641
  degrees: 0.00153
  translate: 0.01077
  scale: 0.16703
  shear: 0.00119
  perspective: 0.0
  flipud: 0.00264
  fliplr: 0.19774
  bgr: 0.0148
  mosaic: 0.60328
  mixup: 0.01208
  cutmix: 0.00419
  copy_paste: 0.00164
  close_mosaic: 10
tune:
  imgsz: 1280
  batch: -1
  epochs: 50
  iterations: 100
  model: weights/yolo26n.pt
  patience: 15
  device: 0
  cache: ram
kfold:
  k: 5
  random_state: 42
evaluate:
  weights: weights/best.pt

database:
  url: postgresql://pcb:pcb1234@localhost:5433/pcb_inspection
  # 다른 PC에서 접속 시: postgresql://pcb:pcb1234@<서버IP>:5432/pcb_inspection
  # 환경변수 DATABASE_URL 설정 시 이 값보다 우선 적용됨

db_server:
  host: 0.0.0.0   # 서버 PC에서 실행 시 0.0.0.0
  port: 8001
  client_url: http://localhost:8001  # 각 앱에서 접속할 URL (다른 PC면 서버 IP로 변경)
