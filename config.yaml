env: local
judge:
  conf_threshold: 0.5
  iou_threshold: 0.45
  review_band:
  - 0.3
  - 0.5
paths:
  colab:
    project_root: /content/pcb-defect-inspection
    raw_data: dataset/PCBData
  local:
    project_root: .
    raw_data: dataset/PCBData
  server:
    project_root: .
    raw_data: dataset/PCBData
preprocess:
  img_size: 640
split:
  random_state: 42
  test: 0.1
  train: 0.7
  val: 0.2
train:
  batch: -1
  epochs: 500
  imgsz: 640
  model: weights/yolov8n.pt
  patience: 50
  workers: 4
  device: 0  # 0=GPU, cpu=CPU. Colab/서버는 0, 로컬 CPU 전용 환경은 cpu
  cache: disk
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  cos_lr: true
  flipud: 0.5
  fliplr: 0.5
  mosaic: 1.0
  box: 10.0
  cls: 1.0
  dfl: 2.0
  rect: true
  iou: 0.65
tune:
  batch: -1
  epochs: 500
  imgsz: 640
  iterations: 20
  model: weights/yolov8n.pt
  workers: 4
  cache: disk
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  cos_lr: true
  flipud: 0.5
  fliplr: 0.5
  mosaic: 1.0
  box: 10.0
  cls: 1.0
  dfl: 2.0
  rect: true
  iou: 0.65
  patience: 50
  device: 0
kfold:
  k: 5
  random_state: 42
evaluate:
  weights: weights/best.pt
