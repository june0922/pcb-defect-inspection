env: local
judge:
  conf_threshold: 0.5
  iou_threshold: 0.45
  review_band:
  - 0.3
  - 0.5
paths:
  colab:
    project_root: /content/pcb-defect-inspection
    raw_data: dataset/PCBData
  local:
    project_root: .
    raw_data: dataset/PCBData
  server:
    project_root: .
    raw_data: dataset/PCBData
preprocess:
  img_size: 1280
split:
  random_state: 42
  test: 0.1
  train: 0.7
  val: 0.2
train:
  imgsz: 1280
  batch: -1
  epochs: 500
  model: weights/yolov8n.pt
  patience: 100
  device: 0  # 0=GPU, cpu=CPU. Colab/서버는 0, 로컬 CPU 전용 환경은 cpu
  cache: ram
tune:
  imgsz: 1280
  batch: -1
  epochs: 30
  iterations: 300
  model: weights/yolov8n.pt
  patience: 50
  device: 0
  cache: ram
kfold:
  k: 5
  random_state: 42
evaluate:
  weights: weights/best.pt
