env: local
judge:
  conf_threshold: 0.5
  iou_threshold: 0.45
  review_band:
  - 0.3
  - 0.5
paths:
  colab:
    project_root: /content/pcb-project
    raw_data: /content/DeepPCB/PCBData
  local:
    project_root: .
    raw_data: dataset/PCBData
  server:
    project_root: /home/team_a/pcb-project
    raw_data: /shared/datasets/DeepPCB/PCBData
preprocess:
  img_size: 640
split:
  random_state: 42
  test: 0.1
  train: 0.7
  val: 0.2
train:
  batch: 16
  epochs: 100
  imgsz: 640
  model: yolov8n.pt
  patience: 50
  workers: 4
tune:
  epochs: 30
  imgsz: 640
  iterations: 30
  model: yolov8n.pt
  workers: 4
